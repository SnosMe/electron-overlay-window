name: Prebuild

on:
  push:
  pull_request:

jobs:
  prebuild-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - run: npm ci
    - run: npm run prebuild
    - uses: actions/upload-artifact@v7
      with:
        name: windows
        path: prebuilds

  prebuild-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - run: |
        sudo apt-get update
        sudo apt-get install -y libxcb1-dev
    - run: npm ci
    - run: npm run prebuild
    - uses: actions/upload-artifact@v7
      with:
        name: linux
        path: prebuilds

  prebuild-darwin:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - run: npm ci
    - run: npm run prebuild -- --arch x64
    - run: npm run prebuild -- --arch arm64
    - uses: actions/upload-artifact@v7
      with:
        name: darwin
        path: prebuilds

  build-package:
    needs:
    - prebuild-windows
    - prebuild-linux
    - prebuild-darwin
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: windows
        path: prebuilds
    - uses: actions/download-artifact@v8
      with:
        name: linux
        path: prebuilds
    - uses: actions/download-artifact@v8
      with:
        name: darwin
        path: prebuilds
    - uses: actions/setup-node@v6
    - run: npm ci --ignore-scripts
    - run: npx tsc
    - run: npm pack
    - uses: actions/upload-artifact@v7
      with:
        name: package
        path: electron-overlay-window-*.tgz
        retention-days: 3
